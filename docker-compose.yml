networks:
  360scalp-v2-net:
    driver: bridge

volumes:
  360scalp-v2-logs:
  360scalp-v2-data:
  360scalp-v2-redis:

services:
  redis:
    image: redis:7.4-alpine
    container_name: 360scalp-v2-redis
    restart: always
    networks:
      - 360scalp-v2-net
    volumes:
      - 360scalp-v2-redis:/data
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

  engine:
    build: .
    container_name: 360scalp-v2-engine
    env_file: .env
    restart: always
    depends_on:
      - redis
    networks:
      - 360scalp-v2-net
    volumes:
      - 360scalp-v2-logs:/app/logs
      - 360scalp-v2-data:/app/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MPLCONFIGDIR=/tmp/matplotlib
      # Phase A pre-TP grab — enabled in production after PR #281 ship.
      # Fires only on signals matching all gates (regime allowlist,
      # setup blacklist, age window, threshold).  See OWNER_BRIEF B11.
      - PRE_TP_ENABLED=true
      # Lumin app HTTP API — opt-in.  Inside the container the server
      # binds to 0.0.0.0 (the container's own network namespace is
      # isolated); the host-side ports mapping below pins the published
      # port to 127.0.0.1 so the only external path is through a reverse
      # proxy that terminates TLS and adds rate limiting.
      - API_ENABLED=${API_ENABLED:-false}
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
    # Publish only to the host loopback so nginx (running on the host)
    # can proxy the API; the WAN can't reach this port directly.
    ports:
      - "127.0.0.1:${API_PORT:-8000}:${API_PORT:-8000}"
    mem_limit: 1g
    cpus: "1.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "healthcheck.py"]
      interval: 30s
      timeout: 10s
      # Longer than V1 — V2 needs time to seed 50 pairs × 5 timeframes
      start_period: 60s
      retries: 3
