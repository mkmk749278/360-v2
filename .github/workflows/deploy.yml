name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy engine
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          request_pty: true
          # Skip host key verification so VPS reinstalls (which change the SSH
          # fingerprint) don't break deployments. The connection is still
          # authenticated via VPS_SSH_KEY. Update VPS_HOST_KEY secret if you
          # want strict fingerprint pinning instead.
          extra_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          script: |
            set -euo pipefail

            # ── Bootstrap: re-authorize deploy key (survives OS reinstall) ──────
            DEPLOY_PUBKEY="${{ secrets.VPS_DEPLOY_PUBKEY }}"
            if [ -n "$DEPLOY_PUBKEY" ]; then
              mkdir -p ~/.ssh
              chmod 700 ~/.ssh
              touch ~/.ssh/authorized_keys
              chmod 600 ~/.ssh/authorized_keys
              if ! grep -qF "$DEPLOY_PUBKEY" ~/.ssh/authorized_keys; then
                echo "$DEPLOY_PUBKEY" >> ~/.ssh/authorized_keys
                echo "ℹ️  Deploy key re-authorized"
              fi
            fi

            # ── Bootstrap: clone repo if missing (fresh VPS / OS reinstall) ─────
            if [ ! -d ~/360-v2/.git ]; then
              echo "ℹ️  Fresh VPS detected — cloning repository..."
              git clone https://github.com/mkmk749278/360-v2.git ~/360-v2
            fi

            cd ~/360-v2

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Bootstrap .env from template only when it does not already exist
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "ℹ️  Created .env from .env.example"
            fi

            # ── Inject/update all secrets in place ──────────────────────────────

            # Telegram
            sed -i "s|^TELEGRAM_BOT_TOKEN=.*|TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}|" .env
            sed -i "s|^TELEGRAM_ACTIVE_CHANNEL_ID=.*|TELEGRAM_ACTIVE_CHANNEL_ID=${{ secrets.TELEGRAM_ACTIVE_CHANNEL_ID }}|" .env
            sed -i "s|^TELEGRAM_FREE_CHANNEL_ID=.*|TELEGRAM_FREE_CHANNEL_ID=${{ secrets.TELEGRAM_FREE_CHANNEL_ID }}|" .env
            sed -i "s|^TELEGRAM_ADMIN_CHAT_ID=.*|TELEGRAM_ADMIN_CHAT_ID=${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}|" .env

            # Binance API keys (update if line exists, append if not)
            grep -q "^BINANCE_API_KEY=" .env \
              && sed -i "s|^BINANCE_API_KEY=.*|BINANCE_API_KEY=${{ secrets.BINANCE_API_KEY }}|" .env \
              || echo "BINANCE_API_KEY=${{ secrets.BINANCE_API_KEY }}" >> .env

            grep -q "^BINANCE_API_SECRET=" .env \
              && sed -i "s|^BINANCE_API_SECRET=.*|BINANCE_API_SECRET=${{ secrets.BINANCE_API_SECRET }}|" .env \
              || echo "BINANCE_API_SECRET=${{ secrets.BINANCE_API_SECRET }}" >> .env

            # OpenAI API key (update if line exists, append if not)
            grep -q "^OPENAI_API_KEY=" .env \
              && sed -i "s|^OPENAI_API_KEY=.*|OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}|" .env \
              || echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env

            # ── Rebuild and restart the engine container ─────────────────────
            docker compose pull --quiet || true
            docker compose up -d --build --remove-orphans

            echo "✅ Deploy complete"
