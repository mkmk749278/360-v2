name: 🔍 VPS Runtime Audit / Truth Report

on:
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: "Lookback window in hours"
        required: false
        default: "24"
        type: string
      compare_previous_window:
        description: "Compare selected lookback against prior equal window"
        required: false
        default: true
        type: boolean
      channel:
        description: "Channel to analyze"
        required: false
        default: "360_SCALP"
        type: string
      symbol_filter:
        description: "Optional symbol filter (comma-separated, exact)"
        required: false
        default: ""
        type: string
      setup_filter:
        description: "Optional setup/path filter (comma-separated substring match)"
        required: false
        default: ""
        type: string
      include_raw_json:
        description: "Include raw structured extracts in truth_snapshot.json"
        required: false
        default: true
        type: boolean
      include_recent_logs:
        description: "Include recent engine log tail artifact"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  runtime-audit:
    name: Build runtime truth report
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.VPS_HOST }}"
          echo "::add-mask::${{ secrets.VPS_USER }}"
          echo "::add-mask::${{ secrets.VPS_SSH_KEY }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Stage monitor helper on VPS
        run: |
          ssh -i ~/.ssh/vps_key \
              -o ConnectTimeout=30 \
              -o StrictHostKeyChecking=no \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'mkdir -p /tmp/360-monitor-scripts'

          scp -i ~/.ssh/vps_key \
              -o ConnectTimeout=30 \
              -o StrictHostKeyChecking=no \
              scripts/monitor_heartbeat.py \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/360-monitor-scripts/"

      - name: Collect structured runtime inputs from VPS
        env:
          LOOKBACK_HOURS: ${{ inputs.lookback_hours }}
          COMPARE_PREVIOUS_WINDOW: ${{ inputs.compare_previous_window }}
          INCLUDE_RECENT_LOGS: ${{ inputs.include_recent_logs }}
        run: |
          set -euo pipefail
          mkdir -p monitor/raw monitor/report

          ssh -i ~/.ssh/vps_key -o ConnectTimeout=30 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "docker inspect 360scalp-v2-engine --format='{\"running\":{{.State.Running}},\"status\":\"{{.State.Status}}\",\"health\":\"{{if .State.Health}}{{.State.Health.Status}}{{else}}unknown{{end}}\"}'" \
            > monitor/raw/runtime_health.json || echo '{"running":false,"status":"missing","health":"unknown"}' > monitor/raw/runtime_health.json

          ssh -i ~/.ssh/vps_key -o ConnectTimeout=30 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cat /tmp/360-monitor-scripts/monitor_heartbeat.py | docker exec -i 360scalp-v2-engine python3" \
            > monitor/raw/heartbeat.txt || echo 'Heartbeat unavailable' > monitor/raw/heartbeat.txt

          ssh -i ~/.ssh/vps_key -o ConnectTimeout=30 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "docker exec 360scalp-v2-engine sh -c 'cat /app/data/signal_performance.json 2>/dev/null || echo []'" \
            > monitor/raw/signal_performance.json

          ssh -i ~/.ssh/vps_key -o ConnectTimeout=30 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "docker compose -f ~/360-v2/docker-compose.yml --project-directory ~/360-v2 logs --since=${LOOKBACK_HOURS}h engine" \
            > monitor/raw/engine_current.log || true

          if [ "${COMPARE_PREVIOUS_WINDOW}" = "true" ]; then
            NOW_TS=$(date -u +%s)
            CURRENT_START_TS=$((NOW_TS - LOOKBACK_HOURS * 3600))
            PREVIOUS_START_TS=$((CURRENT_START_TS - LOOKBACK_HOURS * 3600))
            CURRENT_START_ISO=$(date -u -d "@${CURRENT_START_TS}" +%Y-%m-%dT%H:%M:%SZ)
            PREVIOUS_START_ISO=$(date -u -d "@${PREVIOUS_START_TS}" +%Y-%m-%dT%H:%M:%SZ)
            ssh -i ~/.ssh/vps_key -o ConnectTimeout=30 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              "docker compose -f ~/360-v2/docker-compose.yml --project-directory ~/360-v2 logs --since=${PREVIOUS_START_ISO} --until=${CURRENT_START_ISO} engine" \
              > monitor/raw/engine_previous.log || true
          else
            : > monitor/raw/engine_previous.log
          fi

          if [ "${INCLUDE_RECENT_LOGS}" = "true" ]; then
            ssh -i ~/.ssh/vps_key -o ConnectTimeout=30 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              "docker compose -f ~/360-v2/docker-compose.yml --project-directory ~/360-v2 logs --tail=200 engine" \
              > monitor/report/recent_logs.txt || true
          fi

      - name: Build truth report artifacts
        env:
          LOOKBACK_HOURS: ${{ inputs.lookback_hours }}
          COMPARE_PREVIOUS_WINDOW: ${{ inputs.compare_previous_window }}
          CHANNEL: ${{ inputs.channel }}
          SYMBOL_FILTER: ${{ inputs.symbol_filter }}
          SETUP_FILTER: ${{ inputs.setup_filter }}
          INCLUDE_RAW_JSON: ${{ inputs.include_raw_json }}
        run: |
          set -euo pipefail
          ARGS=(
            --lookback-hours "${LOOKBACK_HOURS}"
            --channel "${CHANNEL}"
            --symbol-filter "${SYMBOL_FILTER}"
            --setup-filter "${SETUP_FILTER}"
            --runtime-health-json monitor/raw/runtime_health.json
            --heartbeat-text monitor/raw/heartbeat.txt
            --performance-json monitor/raw/signal_performance.json
            --current-log monitor/raw/engine_current.log
            --previous-log monitor/raw/engine_previous.log
            --truth-report-md monitor/report/truth_report.md
            --truth-snapshot-json monitor/report/truth_snapshot.json
            --window-comparison-json monitor/report/window_comparison.json
          )

          if [ "${COMPARE_PREVIOUS_WINDOW}" = "true" ]; then
            ARGS+=(--compare-previous-window)
          fi
          if [ "${INCLUDE_RAW_JSON}" = "true" ]; then
            ARGS+=(--include-raw-json)
          fi

          python scripts/build_truth_report.py "${ARGS[@]}"

      - name: Upload runtime truth artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runtime-truth-report-${{ github.run_id }}
          path: monitor/report

      - name: Upload raw extracts
        if: ${{ inputs.include_raw_json }}
        uses: actions/upload-artifact@v4
        with:
          name: runtime-truth-raw-${{ github.run_id }}
          path: monitor/raw

      - name: Clean up SSH key
        if: always()
        run: |
          ssh -i ~/.ssh/vps_key \
              -o ConnectTimeout=10 \
              -o StrictHostKeyChecking=no \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'rm -rf /tmp/360-monitor-scripts' 2>/dev/null || true
          rm -f ~/.ssh/vps_key
