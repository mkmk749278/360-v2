networks:
  360scalp-v2-net:
    driver: bridge

volumes:
  360scalp-v2-logs:
  360scalp-v2-data:
  360scalp-v2-redis:

services:
  redis:
    image: redis:7-alpine
    container_name: 360scalp-v2-redis
    restart: always
    networks:
      - 360scalp-v2-net
    volumes:
      - 360scalp-v2-redis:/data
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

  engine:
    build: .
    container_name: 360scalp-v2-engine
    env_file: .env
    restart: always
    depends_on:
      - redis
    networks:
      - 360scalp-v2-net
    volumes:
      - 360scalp-v2-logs:/app/logs
      - 360scalp-v2-data:/app/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MPLCONFIGDIR=/tmp/matplotlib
    mem_limit: 1g
    cpus: "1.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "healthcheck.py"]
      interval: 30s
      timeout: 10s
      # Longer than V1 — V2 needs time to seed 50 pairs × 5 timeframes
      start_period: 60s
      retries: 3
