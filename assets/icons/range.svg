<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dark teal-tinged background -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0D2020"/>
      <stop offset="100%" stop-color="#0A1A1A"/>
    </radialGradient>
    <!-- Gold gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="40%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <!-- Teal gradient -->
    <linearGradient id="teal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5C8"/>
      <stop offset="100%" stop-color="#00796B"/>
    </linearGradient>
    <!-- Scale beam gradient -->
    <linearGradient id="beam-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <!-- Bollinger band glow -->
    <filter id="wave-glow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Scale glow filter -->
    <filter id="scale-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Text glow -->
    <filter id="text-glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Pan glow -->
    <filter id="pan-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg-grad)" rx="32"/>

  <!-- Bollinger Band wave patterns (background) -->
  <!-- Upper band -->
  <g filter="url(#wave-glow)" opacity="0.3">
    <path d="M30,160 Q100,120 170,145 Q240,170 310,135 Q380,100 450,130 Q490,145 512,135"
          stroke="#00BFA5" stroke-width="1.5" fill="none"/>
    <!-- Middle band (basis) -->
    <path d="M30,240 Q100,230 170,240 Q240,250 310,235 Q380,225 450,235 Q490,240 512,238"
          stroke="#FFD700" stroke-width="1.5" fill="none" opacity="0.5"/>
    <!-- Lower band -->
    <path d="M30,320 Q100,340 170,315 Q240,290 310,330 Q380,365 450,335 Q490,318 512,328"
          stroke="#00BFA5" stroke-width="1.5" fill="none"/>
    <!-- Shaded band area -->
    <path d="M30,160 Q100,120 170,145 Q240,170 310,135 Q380,100 450,130 Q490,145 512,135
             L512,328 Q490,318 450,335 Q380,365 310,330 Q240,290 170,315 Q100,340 30,320 Z"
          fill="#00BFA5" opacity="0.07"/>
  </g>

  <!-- Mean reversion arrows (left-right equilibrium) -->
  <g opacity="0.2" stroke="#00BFA5" stroke-width="1.5" fill="none">
    <path d="M60,256 Q90,240 120,256 Q90,272 60,256"/>
    <path d="M452,256 Q422,240 392,256 Q422,272 452,256"/>
  </g>

  <!-- Scale pillar (vertical pole) -->
  <g filter="url(#scale-glow)">
    <rect x="248" y="130" width="16" height="200" fill="url(#gold-grad)" rx="4"/>
    <!-- Decorative top finial -->
    <circle cx="256" cy="127" r="12" fill="url(#gold-grad)"/>
    <circle cx="256" cy="127" r="6" fill="#FFF176"/>
  </g>

  <!-- Scale beam (horizontal bar - balanced) -->
  <g filter="url(#scale-glow)">
    <rect x="100" y="192" width="312" height="12" fill="url(#beam-grad)" rx="6"/>
    <!-- Central pivot -->
    <circle cx="256" cy="198" r="10" fill="#FFD700"/>
    <circle cx="256" cy="198" r="5" fill="#FFF176"/>
  </g>

  <!-- Chains for left pan -->
  <g stroke="#FFD700" stroke-width="2.5" opacity="0.85">
    <line x1="140" y1="204" x2="128" y2="264"/>
    <line x1="155" y1="204" x2="167" y2="264"/>
    <!-- Cross chains -->
    <line x1="140" y1="214" x2="155" y2="220"/>
    <line x1="140" y1="230" x2="155" y2="236"/>
    <line x1="140" y1="246" x2="155" y2="252"/>
  </g>

  <!-- Chains for right pan -->
  <g stroke="#FFD700" stroke-width="2.5" opacity="0.85">
    <line x1="358" y1="204" x2="346" y2="264"/>
    <line x1="373" y1="204" x2="385" y2="264"/>
    <!-- Cross chains -->
    <line x1="358" y1="214" x2="373" y2="220"/>
    <line x1="358" y1="230" x2="373" y2="236"/>
    <line x1="358" y1="246" x2="373" y2="252"/>
  </g>

  <!-- Left pan -->
  <g filter="url(#pan-glow)">
    <ellipse cx="148" cy="272" rx="52" ry="12" fill="#00BFA5" opacity="0.15"/>
    <path d="M100,268 Q148,290 196,268" stroke="url(#teal-grad)" stroke-width="3" fill="none"/>
    <path d="M100,268 Q148,278 196,268" fill="#00BFA5" opacity="0.2"/>
  </g>

  <!-- Right pan -->
  <g filter="url(#pan-glow)">
    <ellipse cx="366" cy="272" rx="52" ry="12" fill="#00BFA5" opacity="0.15"/>
    <path d="M318,268 Q366,290 414,268" stroke="url(#teal-grad)" stroke-width="3" fill="none"/>
    <path d="M318,268 Q366,278 414,268" fill="#00BFA5" opacity="0.2"/>
  </g>

  <!-- Crypto coin on left pan (Bitcoin symbol) -->
  <g filter="url(#pan-glow)">
    <circle cx="148" cy="256" r="24" fill="#B8860B" opacity="0.9"/>
    <circle cx="148" cy="256" r="22" fill="#FFD700"/>
    <circle cx="148" cy="256" r="18" fill="#B8860B"/>
    <!-- ₿ symbol -->
    <text x="148" y="263" font-family="Arial, sans-serif" font-size="20" font-weight="bold"
          fill="#FFD700" text-anchor="middle">₿</text>
  </g>

  <!-- Crypto coin on right pan (Ethereum symbol) -->
  <g filter="url(#pan-glow)">
    <circle cx="366" cy="256" r="24" fill="#005B4F" opacity="0.9"/>
    <circle cx="366" cy="256" r="22" fill="#00BFA5"/>
    <circle cx="366" cy="256" r="18" fill="#004D40"/>
    <!-- Ξ (ETH) symbol -->
    <text x="366" y="263" font-family="Arial, sans-serif" font-size="20" font-weight="bold"
          fill="#00E5C8" text-anchor="middle">Ξ</text>
  </g>

  <!-- Scale base / stand -->
  <g filter="url(#scale-glow)">
    <rect x="232" y="330" width="48" height="16" fill="url(#gold-grad)" rx="4"/>
    <rect x="200" y="346" width="112" height="12" fill="url(#gold-grad)" rx="4"/>
  </g>

  <!-- Decorative teal particles -->
  <g opacity="0.5">
    <circle cx="60" cy="200" r="2" fill="#00BFA5"/>
    <circle cx="75" cy="240" r="1.5" fill="#00BFA5"/>
    <circle cx="55" cy="280" r="2" fill="#FFD700"/>
    <circle cx="450" cy="200" r="2" fill="#00BFA5"/>
    <circle cx="438" cy="245" r="1.5" fill="#00BFA5"/>
    <circle cx="455" cy="285" r="2" fill="#FFD700"/>
    <circle cx="200" cy="80" r="2" fill="#00BFA5"/>
    <circle cx="310" cy="75" r="2" fill="#FFD700"/>
    <circle cx="255" cy="60" r="1.5" fill="#00BFA5"/>
  </g>

  <!-- "RANGE" text -->
  <g filter="url(#text-glow)">
    <text x="256" y="446" font-family="'Arial', 'Helvetica', sans-serif" font-size="54" font-weight="900"
          fill="url(#gold-grad)" text-anchor="middle" letter-spacing="5">RANGE</text>
  </g>
  <!-- Text underline -->
  <rect x="100" y="455" width="312" height="3" rx="1.5" fill="#00BFA5" opacity="0.8"/>

  <!-- Corner decoration -->
  <g stroke="#FFD700" stroke-width="2" fill="none" opacity="0.4">
    <path d="M30,30 L30,55 M30,30 L55,30"/>
    <path d="M482,30 L482,55 M482,30 L457,30"/>
    <path d="M30,482 L30,457 M30,482 L55,482"/>
    <path d="M482,482 L482,457 M482,482 L457,482"/>
  </g>
</svg>
