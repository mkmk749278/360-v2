<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0D1A2E"/>
      <stop offset="100%" stop-color="#0A0A1A"/>
    </radialGradient>
    <!-- Gold gradient for lightning bolt -->
    <linearGradient id="bolt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <!-- Cyan glow gradient -->
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#0097A7"/>
    </linearGradient>
    <!-- Glow filter for lightning bolt -->
    <filter id="bolt-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Outer glow filter -->
    <filter id="outer-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Text glow -->
    <filter id="text-glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Cyan particle glow -->
    <filter id="particle-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg-grad)" rx="32"/>

  <!-- Circuit board lines (background details) -->
  <g opacity="0.18" stroke="#00E5FF" stroke-width="1" fill="none">
    <line x1="60" y1="120" x2="180" y2="120"/>
    <line x1="180" y1="120" x2="180" y2="80"/>
    <line x1="180" y1="80" x2="260" y2="80"/>
    <line x1="330" y1="120" x2="450" y2="120"/>
    <line x1="330" y1="120" x2="330" y2="80"/>
    <line x1="250" y1="80" x2="330" y2="80"/>
    <line x1="60" y1="390" x2="160" y2="390"/>
    <line x1="160" y1="390" x2="160" y2="430"/>
    <line x1="160" y1="430" x2="240" y2="430"/>
    <line x1="350" y1="390" x2="450" y2="390"/>
    <line x1="350" y1="390" x2="350" y2="430"/>
    <line x1="270" y1="430" x2="350" y2="430"/>
    <!-- Dots at circuit nodes -->
    <circle cx="180" cy="80" r="3" fill="#00E5FF" stroke="none"/>
    <circle cx="330" cy="80" r="3" fill="#00E5FF" stroke="none"/>
    <circle cx="160" cy="430" r="3" fill="#00E5FF" stroke="none"/>
    <circle cx="350" cy="430" r="3" fill="#00E5FF" stroke="none"/>
    <!-- Vertical lines -->
    <line x1="90" y1="60" x2="90" y2="160"/>
    <line x1="420" y1="60" x2="420" y2="160"/>
    <line x1="90" y1="350" x2="90" y2="450"/>
    <line x1="420" y1="350" x2="420" y2="450"/>
  </g>

  <!-- Digital matrix particles (cyan dots) -->
  <g filter="url(#particle-glow)" opacity="0.6">
    <circle cx="70" cy="200" r="2.5" fill="#00E5FF"/>
    <circle cx="110" cy="170" r="1.8" fill="#00E5FF"/>
    <circle cx="140" cy="230" r="2" fill="#00E5FF"/>
    <circle cx="80" cy="280" r="1.5" fill="#00E5FF"/>
    <circle cx="440" cy="190" r="2.5" fill="#00E5FF"/>
    <circle cx="400" cy="220" r="1.8" fill="#00E5FF"/>
    <circle cx="460" cy="260" r="2" fill="#00E5FF"/>
    <circle cx="430" cy="300" r="1.5" fill="#00E5FF"/>
    <circle cx="100" cy="320" r="2" fill="#FFD700"/>
    <circle cx="410" cy="340" r="2" fill="#FFD700"/>
    <circle cx="75" cy="150" r="1.5" fill="#FFD700"/>
    <circle cx="440" cy="155" r="1.5" fill="#FFD700"/>
    <circle cx="200" cy="60" r="2" fill="#00E5FF"/>
    <circle cx="310" cy="55" r="2" fill="#00E5FF"/>
    <circle cx="255" cy="70" r="1.5" fill="#FFD700"/>
  </g>

  <!-- Outer cyan ring glow -->
  <circle cx="256" cy="230" r="140" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.15"/>
  <circle cx="256" cy="230" r="120" fill="none" stroke="#00E5FF" stroke-width="0.8" opacity="0.1"/>

  <!-- Lightning bolt glow layer (cyan shadow) -->
  <g filter="url(#outer-glow)" opacity="0.5">
    <polygon points="290,90 220,240 265,240 222,380 310,200 260,200 300,90" fill="#00E5FF"/>
  </g>

  <!-- Lightning bolt main shape (gold) -->
  <g filter="url(#bolt-glow)">
    <polygon points="290,90 220,240 265,240 222,380 310,200 260,200 300,90" fill="url(#bolt-grad)"/>
  </g>

  <!-- Lightning bolt highlight -->
  <polygon points="285,110 262,210 275,210 285,110" fill="white" opacity="0.35"/>

  <!-- Small speed lines around bolt -->
  <g stroke="#00E5FF" stroke-width="2" opacity="0.5" stroke-linecap="round">
    <line x1="155" y1="180" x2="195" y2="190"/>
    <line x1="150" y1="210" x2="192" y2="215"/>
    <line x1="158" y1="240" x2="196" y2="240"/>
    <line x1="355" y1="200" x2="315" y2="210"/>
    <line x1="360" y1="230" x2="318" y2="232"/>
  </g>

  <!-- "SCALP" text -->
  <g filter="url(#text-glow)">
    <text x="256" y="446" font-family="'Arial Black', 'Arial', sans-serif" font-size="54" font-weight="900"
          fill="url(#bolt-grad)" text-anchor="middle" letter-spacing="6">SCALP</text>
  </g>
  <!-- Text underline bar -->
  <rect x="120" y="455" width="272" height="3" rx="1.5" fill="#00E5FF" opacity="0.7"/>

  <!-- Corner decoration marks -->
  <g stroke="#FFD700" stroke-width="2" fill="none" opacity="0.4">
    <path d="M30,30 L30,55 M30,30 L55,30"/>
    <path d="M482,30 L482,55 M482,30 L457,30"/>
    <path d="M30,482 L30,457 M30,482 L55,482"/>
    <path d="M482,482 L482,457 M482,482 L457,482"/>
  </g>
</svg>
